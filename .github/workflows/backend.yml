name: Deploy Backend to Azure

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/backend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore src/LMS.API/LMS.API.csproj

      - name: Build
        run: dotnet build src/LMS.API/LMS.API.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/LMS.API/LMS.API.csproj --configuration Release --no-build --output ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./publish
